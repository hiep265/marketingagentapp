version: '3.3'

services:
  # ==========================================
  # Workspace SSO (single login for all apps)
  # ==========================================
  keycloak-postgres:
    image: postgres:17-alpine
    container_name: keycloak-postgres
    restart: always
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: daabf789f1777420a4aca3c1db946d02070a0a8f1cb8e01f
    volumes:
      - keycloak-postgres-data:/var/lib/postgresql/data
    networks:
      - workspace-network
    healthcheck:
      test: pg_isready -U keycloak -d keycloak
      interval: 10s
      timeout: 3s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.1.4
    container_name: keycloak
    restart: always
    command: ["start", "--import-realm"]
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: daabf789f1777420a4aca3c1db946d02070a0a8f1cb8e01f
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME: https://app.hiep265.shop
      KC_PROXY_HEADERS: xforwarded
      KC_HEALTH_ENABLED: "true"
      KC_BOOTSTRAP_ADMIN_USERNAME: workspace-admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: b6a474783e5c0c5ef0f3202ab10aeb4dc0639287b004aa17
    volumes:
      - ./keycloak/import:/opt/keycloak/data/import:ro
    depends_on:
      - keycloak-postgres
    networks:
      - workspace-network

  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.9.0
    container_name: oauth2-proxy
    restart: always
    command:
      - --http-address=0.0.0.0:4180
      - --reverse-proxy=true
      - --provider=oidc
      - --provider-display-name=Workspace SSO
      - --oidc-issuer-url=https://app.hiep265.shop/realms/workspace
      - --skip-oidc-discovery=true
      - --login-url=https://app.hiep265.shop/realms/workspace/protocol/openid-connect/auth
      - --redeem-url=http://keycloak:8080/realms/workspace/protocol/openid-connect/token
      - --oidc-jwks-url=http://keycloak:8080/realms/workspace/protocol/openid-connect/certs
      - --client-id=workspace-gate
      - --client-secret=c899b90974311353214e25408fb84e9abb2b6e097ca36bff1552595b3d1d2f4a
      - --redirect-url=https://app.hiep265.shop/oauth2/callback
      - --scope=openid email profile
      - --email-domain=*
      - --cookie-name=_workspace_sso_v2
      - --cookie-secret=09f36e7151c04dcb7743e76f53ffee23
      - --cookie-domain=.hiep265.shop
      - --whitelist-domain=.hiep265.shop
      - --cookie-secure=true
      - --cookie-samesite=lax
      - --cookie-refresh=0
      - --cookie-expire=8h
      - --set-xauthrequest=true
      - --pass-access-token=true
      - --pass-user-headers=true
      - --skip-provider-button=true
      - --upstream=static://202
    depends_on:
      - keycloak
    networks:
      - workspace-network

  # ==========================================
  # Nginx Reverse Proxy
  # ==========================================
  nginx-proxy:
    image: nginx:alpine
    container_name: nginx-proxy
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx-snippets:/etc/nginx/snippets:ro
    depends_on:
      - oauth2-proxy
      - keycloak
      - app-shell
      - chatwoot-web
      - postiz-web
      - openclaw-gateway
    networks:
      workspace-network:
        ipv4_address: 172.18.0.9
      edge-network:
        aliases:
          - app-shell
          - chatwoot-web
          - postiz-web
          - openclaw-gateway

  # ==========================================
  # Next.js App Shell
  # ==========================================
  app-shell:
    build:
      context: ./app-shell
      dockerfile: Dockerfile
    container_name: app-shell
    restart: always
    networks:
      workspace-network:
        aliases:
          - app-shell-origin

  # ==========================================
  # Chatwoot Stack (Omnichannel Chat)
  # ==========================================
  chatwoot-web:
    build:
      context: ./chatwoot
      dockerfile: docker/Dockerfile
    container_name: chatwoot-web
    restart: always
    env_file: ./chatwoot.env
    entrypoint: docker/entrypoints/rails.sh
    command: ['bundle', 'exec', 'rails', 's', '-p', '3000', '-b', '0.0.0.0']
    depends_on:
      - chatwoot-postgres
      - chatwoot-redis
    volumes:
      - chatwoot-storage:/app/storage
      - ./chatwoot-overrides/omniauth_saml_get.rb:/app/config/initializers/omniauth_saml_get.rb:ro
      - ./chatwoot-overrides/ruby_saml_dig_patch.rb:/app/config/initializers/ruby_saml_dig_patch.rb:ro
      - ./chatwoot-overrides/enterprise_bypass.rb:/app/config/initializers/enterprise_bypass.rb:ro
    networks:
      workspace-network:
        aliases:
          - chatwoot-web-origin

  chatwoot-sidekiq:
    build:
      context: ./chatwoot
      dockerfile: docker/Dockerfile
    container_name: chatwoot-sidekiq
    restart: always
    env_file: ./chatwoot.env
    command: ['bundle', 'exec', 'sidekiq', '-C', 'config/sidekiq.yml']
    depends_on:
      - chatwoot-postgres
      - chatwoot-redis
    volumes:
      - chatwoot-storage:/app/storage
      - ./chatwoot-overrides/omniauth_saml_get.rb:/app/config/initializers/omniauth_saml_get.rb:ro
      - ./chatwoot-overrides/ruby_saml_dig_patch.rb:/app/config/initializers/ruby_saml_dig_patch.rb:ro
      - ./chatwoot-overrides/enterprise_bypass.rb:/app/config/initializers/enterprise_bypass.rb:ro
    networks:
      - workspace-network

  chatwoot-postgres:
    image: pgvector/pgvector:pg16
    container_name: chatwoot-postgres
    restart: always
    environment:
      - POSTGRES_DB=chatwoot_production
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=chatwoot_secure_db_pass
    volumes:
      - chatwoot-postgres-data:/var/lib/postgresql/data
    networks:
      - workspace-network

  chatwoot-redis:
    image: redis:alpine
    container_name: chatwoot-redis
    restart: always
    command: ["sh", "-c", "redis-server --requirepass \"$$REDIS_PASSWORD\""]
    env_file: ./chatwoot.env
    volumes:
      - chatwoot-redis-data:/data
    networks:
      - workspace-network

  chatwoot-mailhog:
    image: axllent/mailpit:latest
    container_name: chatwoot-mailhog
    restart: always
    networks:
      - workspace-network

  # ==========================================
  # Postiz Stack (Social Scheduler)
  # ==========================================
  postiz-web:
    image: ghcr.io/gitroomhq/postiz-app:latest
    container_name: postiz-web
    restart: always
    env_file: ./postiz.env
    depends_on:
      - postiz-postgres
      - postiz-redis
      - keycloak
    volumes:
      - postiz-config:/config/
      - postiz-uploads:/uploads/
      - ./postiz-overrides/oauth.provider.js:/app/apps/backend/dist/apps/backend/src/services/auth/providers/oauth.provider.js:ro
    networks:
      workspace-network:
        aliases:
          - postiz-web-origin

  postiz-postgres:
    image: postgres:17-alpine
    container_name: postiz-postgres
    restart: always
    environment:
      POSTGRES_PASSWORD: postiz_secure_db_pass
      POSTGRES_USER: postiz-user
      POSTGRES_DB: postiz_db
    volumes:
      - postiz-postgres-data:/var/lib/postgresql/data
    networks:
      - workspace-network
    healthcheck:
      test: pg_isready -U postiz-user -d postiz_db
      interval: 10s
      timeout: 3s
      retries: 3

  postiz-redis:
    image: redis:7.2
    container_name: postiz-redis
    restart: always
    volumes:
      - postiz-redis-data:/data
    networks:
      - workspace-network
    healthcheck:
      test: redis-cli ping
      interval: 10s
      timeout: 3s
      retries: 3

  # Temporal Stack (required by Postiz v2.12.0+)
  temporal-elasticsearch:
    image: elasticsearch:7.17.27
    container_name: temporal-elasticsearch
    restart: always
    environment:
      - cluster.routing.allocation.disk.threshold_enabled=true
      - cluster.routing.allocation.disk.watermark.low=512mb
      - cluster.routing.allocation.disk.watermark.high=256mb
      - cluster.routing.allocation.disk.watermark.flood_stage=128mb
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms256m -Xmx256m
      - xpack.security.enabled=false
    volumes:
      - temporal-es-data:/usr/share/elasticsearch/data
    networks:
      - workspace-network

  temporal-postgresql:
    image: postgres:16
    container_name: temporal-postgresql
    restart: always
    environment:
      POSTGRES_PASSWORD: temporal
      POSTGRES_USER: temporal
    volumes:
      - temporal-postgres-data:/var/lib/postgresql/data
    networks:
      - workspace-network

  temporal:
    image: temporalio/auto-setup:1.28.1
    container_name: temporal
    restart: always
    depends_on:
      - temporal-postgresql
      - temporal-elasticsearch
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=temporal-postgresql
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
      - ENABLE_ES=true
      - ES_SEEDS=temporal-elasticsearch
      - ES_VERSION=v7
      - TEMPORAL_NAMESPACE=default
    volumes:
      - ./postiz/dynamicconfig:/etc/temporal/config/dynamicconfig
    networks:
      - workspace-network

  temporal-ui:
    image: temporalio/ui:2.34.0
    container_name: temporal-ui
    restart: always
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://127.0.0.1:3000
    networks:
      - workspace-network

  # ==========================================
  # OpenClaw Stack (AI Orchestrator)
  # ==========================================
  openclaw-gateway:
    image: openclaw/openclaw:latest
    container_name: openclaw-gateway
    restart: unless-stopped
    command: ["node", "openclaw.mjs", "gateway", "--allow-unconfigured", "--auth", "trusted-proxy", "--bind", "auto"]
    volumes:
      - ./openclaw-state:/home/node/.openclaw
      - ./openclaw-workspace:/home/node/.openclaw/workspace
    environment:
      - TZ=UTC
      - OPENCLAW_MODE=local
    networks:
      workspace-network:
        aliases:
          - openclaw-gateway-origin



  # ==========================================
  # Cloudflare Tunnel
  # ==========================================
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: always
    command: tunnel --config /etc/cloudflared/config.yml run
    volumes:
      - ./cloudflared:/etc/cloudflared:ro
    networks:
      - edge-network

# ==========================================
# Volumes
# ==========================================
volumes:
  keycloak-postgres-data:
  chatwoot-storage:
  chatwoot-postgres-data:
  chatwoot-redis-data:
  postiz-config:
  postiz-uploads:
  postiz-postgres-data:
  postiz-redis-data:
  temporal-es-data:
  temporal-postgres-data:

# ==========================================
# Networks
# ==========================================
networks:
  edge-network:
    driver: bridge
  workspace-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.18.0.0/16
