events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # Allow large uploads for attachments/campaigns/BIM models
    client_max_body_size 500M;

    # Allow large headers (e.g. from OIDC/SSO cookies) to prevent 400 Bad Request
    client_header_buffer_size 64k;
    large_client_header_buffers 4 64k;
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;

    # Helper maps for web sockets
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Prefer the external scheme from Cloudflare Tunnel, then fall back to Nginx scheme.
    map $http_x_forwarded_proto $forwarded_proto {
        default $http_x_forwarded_proto;
        ''      $scheme;
    }

    # Keycloak identity provider
    server {
        listen 80;
        server_name auth.hiep265.shop;

        location / {
            proxy_pass http://keycloak:8080;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_set_header X-Forwarded-Host $host;
            proxy_buffer_size 128k;
            proxy_buffers 4 256k;
            proxy_busy_buffers_size 256k;
        }
    }

    # Next.js App Shell
    server {
        listen 80;
        listen 3000;
        server_name app.hiep265.shop;

        include /etc/nginx/snippets/oauth2-locations.conf;

        location ~ ^/(admin|realms|resources)/ {
            proxy_pass http://keycloak:8080;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_set_header X-Forwarded-Host $host;
            proxy_buffer_size 128k;
            proxy_buffers 4 256k;
            proxy_busy_buffers_size 256k;
        }

        location = /api/bim/upload {
            include /etc/nginx/snippets/oauth2-protect.conf;

            client_max_body_size 500M;
            proxy_pass http://app-shell-origin:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_connect_timeout 60s;
            proxy_send_timeout 900s;
            proxy_read_timeout 900s;
        }

        location / {
            include /etc/nginx/snippets/oauth2-protect.conf;

            proxy_pass http://app-shell-origin:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
        }
    }

    # Chatwoot Web & API
    server {
        listen 80;
        listen 3000;
        server_name chat.hiep265.shop;

        include /etc/nginx/snippets/oauth2-locations.conf;

        location = / {
            include /etc/nginx/snippets/oauth2-protect.conf;
            return 302 https://chat.hiep265.shop/auth/saml?account_id=1&RelayState=web;
        }

        location ~ ^/(webhooks|widget|packs|assets|rails/active_storage|instagram/callback|microsoft/callback|google/callback|tiktok/callback|notion/callback) {
            proxy_pass http://chatwoot-web-origin:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;

            # Allow framing from App Shell / public sites
            proxy_hide_header X-Frame-Options;
            add_header Content-Security-Policy "frame-ancestors 'self' https://app.hiep265.shop http://localhost" always;
        }

        location / {
            include /etc/nginx/snippets/oauth2-protect.conf;

            proxy_pass http://chatwoot-web-origin:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;

            # Allow framing from App Shell
            proxy_hide_header X-Frame-Options;
            add_header Content-Security-Policy "frame-ancestors 'self' https://app.hiep265.shop http://localhost" always;
        }
    }

    # Postiz Web & API
    server {
        listen 80;
        listen 5000;
        server_name post.hiep265.shop;

        include /etc/nginx/snippets/oauth2-locations.conf;

        location / {
            include /etc/nginx/snippets/oauth2-protect.conf;

            proxy_pass http://postiz-web-origin:5000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;

            # Allow framing from App Shell
            proxy_hide_header X-Frame-Options;
            add_header Content-Security-Policy "frame-ancestors 'self' https://app.hiep265.shop http://localhost" always;
        }
    }

    # OpenClaw Dashboard & WebSocket Gateway
    server {
        listen 80;
        listen 18789;
        server_name openclaw.hiep265.shop;

        include /etc/nginx/snippets/oauth2-locations.conf;

        location / {
            include /etc/nginx/snippets/oauth2-protect.conf;

            proxy_pass http://openclaw-gateway-origin:18789;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;

            # Allow framing from App Shell by hiding the backend's strict security headers and defining a permissive one
            proxy_hide_header X-Frame-Options;
            proxy_hide_header Content-Security-Policy;
            add_header Content-Security-Policy "frame-ancestors 'self' https://app.hiep265.shop http://localhost" always;

            # OpenClaw was previously token-backed; clear stale browser credentials so
            # trusted-proxy SSO is used instead of a cached token/password.
            sub_filter_once on;
            sub_filter '<openclaw-app></openclaw-app>' '<script>(function(){try{for(var i=0,ks=Object.keys(localStorage);i<ks.length;i++){var k=ks[i];if(k.toLowerCase().indexOf("openclaw")<0)continue;var raw=localStorage.getItem(k)||"";var v;try{v=JSON.parse(raw)}catch(e){if(/token|password/i.test(raw))localStorage.removeItem(k);continue}if(v&&typeof v==="object"){var changed=false;if(v.token){delete v.token;changed=true}if(v.password){delete v.password;changed=true}if(v.auth&&typeof v.auth==="object"){delete v.auth.token;delete v.auth.password;changed=true}if(changed)localStorage.setItem(k,JSON.stringify(v));}}}catch(e){}})();</script><openclaw-app></openclaw-app>';
        }
    }

    # OpenConstructionERP
    server {
        listen 80;
        server_name erp.hiep265.shop;

        location / {
            return 503 "OpenConstructionERP is not running on this workspace.\n";
        }
    }
}
